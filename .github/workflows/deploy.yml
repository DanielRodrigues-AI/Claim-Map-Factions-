name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # 👈 Altere para 'master' se sua branch principal tiver esse nome

# Permissões necessárias para o GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 👈 O Vite joga o build pronto aqui

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4